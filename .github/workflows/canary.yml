name: Canary

on:
  schedule:
    - cron: '0 9 1 * *' # run on the first day of every month at 9:00 UTC

jobs:
  unit-test:
    name: "Unit Test (Canary)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
        texlive-version: ["2026"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          cache: "pip"
          python-version: ${{ matrix.python-version }}
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools
          pip install -r requirements.txt
      - name: Generate random cache version
        id: cache-version
        run: echo "value=$RANDOM" >> $GITHUB_OUTPUT
      - name: Setup TeX Live
        uses: zauguin/install-texlive@v4
        with:
          texlive_version: ${{ matrix.texlive-version }}
          cache_version: ${{ steps.cache-version.outputs.value }}
          packages: >-
            scheme-basic
            latexmk
      - name: Run unittests
        run: make test
